<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | CET Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="bg-particles"></div>

  <div class="form-page">
    <div class="form-card">
      <div class="form-logo">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;">🛡</div>
        <span>Admin Login</span>
        <p>Authorized personnel only</p>
      </div>

      <div id="alertBox"></div>

      <form id="adminLoginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Email Address <span>*</span></label>
          <input type="email" id="username" class="form-input" placeholder="Enter admin email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span>*</span></label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="Enter password" required />
            <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mid);cursor:pointer;font-size:18px;" id="eyeBtn">👁</button>
          </div>
          <p style="font-size:12px; color:var(--mid); margin-top:4px;">Please enter your secure admin credentials.</p>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">🔐 Login as Admin</button>
      </form>

      <div class="form-footer" style="margin-top:20px;">
        <a href="../student/login.html" style="color:var(--mid); font-size:13px;">&larr; Student Login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import SupaDB from '../js/supabase-db.js';

    window.togglePwd = function() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
      document.getElementById('eyeBtn').textContent = p.type === 'password' ? '👁' : '🙈';
    }

    const supabase = SupaDB.getClient();

    if (supabase) {
       // Check if already logged in
       supabase.auth.getUser().then(({ data }) => {
         if (data && data.user) {
            window.location.href = 'dashboard.html';
         }
       });
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');

      if (!user || !pass) {
        document.getElementById('alertBox').innerHTML = '<div class="alert alert-warning">⚠ Please fill all fields.</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Logging in...';

      if (!supabase) {
         document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger">❌ Supabase client not initialized. Check .env config.</div>';
         btn.disabled = false;
         btn.textContent = '🔐 Login as Admin';
         return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
         email: user,
         password: pass
      });

      if (error) {
         document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger">❌ Invalid credentials or user not found.</div>';
         btn.disabled = false;
         btn.textContent = '🔐 Login as Admin';
      } else {
         window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
