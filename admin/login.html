<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | CET Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="bg-particles"></div>

  <div class="form-page">
    <div class="form-card">
      <div class="form-logo">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;">🛡</div>
        <span>Admin Login</span>
        <p>Authorized personnel only</p>
      </div>

      <div id="alertBox"></div>

      <form id="adminLoginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username <span>*</span></label>
          <input type="text" id="username" class="form-input" placeholder="admin" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span>*</span></label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="Enter password" required />
            <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mid);cursor:pointer;font-size:18px;" id="eyeBtn">👁</button>
          </div>
          <p style="font-size:12px; color:var(--mid); margin-top:4px;">Default: username <strong>admin</strong>, password <strong>admin123</strong></p>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">🔐 Login as Admin</button>
      </form>

      <div class="form-footer" style="margin-top:20px;">
        <a href="../student/login.html" style="color:var(--mid); font-size:13px;">← Student Login</a>
      </div>
    </div>
  </div>

  <script src="../js/db.js"></script>
  <script>
    // Default credentials
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123';

    function togglePwd() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
      document.getElementById('eyeBtn').textContent = p.type === 'password' ? '👁' : '🙈';
    }

    // Check if already logged in
    if (DB.isAdminLoggedIn()) window.location.href = 'dashboard.html';

    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');

      if (!user || !pass) {
        document.getElementById('alertBox').innerHTML = '<div class="alert alert-warning">⚠ Please fill all fields.</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Logging in...';

      setTimeout(() => {
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
          DB.setAdminLogin(true);
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger">❌ Invalid credentials. Try admin / admin123</div>';
          btn.disabled = false;
          btn.textContent = '🔐 Login as Admin';
        }
      }, 700);
    });
  </script>
</body>
</html>
