<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login | CET Portal</title>
  <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" /> -->
  <link rel="stylesheet" href="../css/main.css" />
  <!-- OFFLINE MODE SCRIPT -->
  <script>
    if (window.location.search.includes('offline=true')) {
      localStorage.setItem('OFFLINE_API_URL', window.location.origin);
      console.log('✅ Offline Mode Enabled:', window.location.origin);
    }
  </script>
</head>
<body>
  <div class="bg-particles"></div>

  <div class="form-page">
    <div class="form-card">
      <div class="form-logo">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;">🎓</div>
        <span>Student Login</span>
        <p>Access your exam portal</p>
      </div>

      <div id="alertBox"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address or Student ID <span>*</span></label>
          <input type="text" id="email" class="form-input" placeholder="Email or MSC-CS-..." required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span>*</span></label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="Your mobile number" required />
            <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mid);cursor:pointer;font-size:18px;" id="eyeBtn">👁</button>
          </div>
          <p style="font-size:12px; color:var(--mid); margin-top:4px;">Default password is your registered mobile number</p>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">Login to Portal</button>
      </form>

      <div class="form-footer">
        <p>Admissions are currently closed.</p>
        <p style="margin-top:8px;"><a href="../admin/login.html" style="color:var(--mid); font-size:13px;">Admin Login &rarr;</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import DB from '../js/db.js';
    import { isReady, getClient } from '../js/supabase-db.js';
    
    window.showAlert = function(msg, type) {
      document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }

    window.togglePwd = function() {
      const p = document.getElementById('password');
      const btn = document.getElementById('eyeBtn');
      if (p.type === 'password') { p.type = 'text'; btn.textContent = '🙈'; }
      else { p.type = 'password'; btn.textContent = '👁'; }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pwd = document.getElementById('password').value.trim().replace(/\s/g, '');
      const btn = document.getElementById('loginBtn');

      if (!email || !pwd) { showAlert('⚠ Please fill all fields.', 'warning'); return; }

      btn.disabled = true;
      btn.textContent = '⏳ Logging in...';

      try {
        let student = null;
        let fromCloud = false;
        
        try {
          if (isReady()) {
            const supabase = getClient();
            console.log('[Login] Querying Supabase securely for:', email);
            const { data, error } = await supabase.rpc('student_login', { p_email: email });
            
            if (data && data.length > 0 && !error) {
              const studentsData = data.map(d => ({
                id: d.id || 'STU' + Date.now() + Math.random(),
                studentId: d.student_id,
                fullName: d.full_name,
                name: d.full_name,
                email: d.email,
                mobile: d.mobile,
                password: d.password_hash || d.mobile,
                status: d.status,
                hasAttempted: d.has_attempted,
                courseApplied: d.course_applied,
                applicationStatus: d.application_status,
                examStatus: d.exam_status,
                examDate: d.exam_date
              }));
              student = studentsData;
              fromCloud = true;
              console.log(`[Login] Loaded ${studentsData.length} profiles from Supabase securely.`);
            } else if (error) {
              console.log('[Login] Supabase RPC error:', error.message);
            }
          }
        } catch (supaErr) {
          console.warn('[Login] Supabase fetch failed, trying local storage:', supaErr);
        }

        // Fallback: If not found in Supabase (e.g. offline), try localStorage
        if (!student || student.length === 0) {
          student = DB.getStudents().filter(s => s.email?.toLowerCase() === email);
          if (student.length > 0) console.log(`[Login] Fallback: Loaded ${student.length} profiles from local storage cache.`);
          else student = null;
        }

        if (!student || student.length === 0) {
          showAlert('❌ No account found with this email. Please apply first.', 'danger');
          btn.disabled = false; btn.textContent = 'Login to Portal'; return;
        }
        
        const activeStudent = student[0];
        if (activeStudent.password !== pwd && activeStudent.mobile !== pwd) {
          showAlert('❌ Incorrect password. Use your registered mobile number.', 'danger');
          btn.disabled = false; btn.textContent = 'Login to Portal'; return;
        }

        // Save all applications for the student dashboard to manage
        localStorage.setItem("allStudentApps", JSON.stringify(student));
        DB.setCurrentStudent(activeStudent);
        localStorage.setItem("studentData", JSON.stringify(activeStudent));
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Login error:', error);
        showAlert('❌ ' + (error.message || 'An error occurred during login.'), 'danger');
        btn.disabled = false; 
        btn.textContent = 'Login to Portal';
      }
    });
  </script>
</body>
</html>
