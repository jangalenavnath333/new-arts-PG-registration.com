<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login | CET Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="bg-particles"></div>

  <div class="form-page">
    <div class="form-card">
      <div class="form-logo">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;">🎓</div>
        <span>Student Login</span>
        <p>Access your exam portal</p>
      </div>

      <div id="alertBox"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address <span>*</span></label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span>*</span></label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="Your mobile number" required />
            <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mid);cursor:pointer;font-size:18px;" id="eyeBtn">👁</button>
          </div>
          <p style="font-size:12px; color:var(--mid); margin-top:4px;">Default password is your registered mobile number</p>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">Login to Portal</button>
      </form>

      <div class="form-footer">
        <p>Don't have an account? <a href="apply.html">Apply Now</a></p>
        <p style="margin-top:8px;"><a href="../admin/login.html" style="color:var(--mid); font-size:13px;">Admin Login &rarr;</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import DB from '../js/db.js';
    
    window.showAlert = function(msg, type) {
      document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }

    window.togglePwd = function() {
      const p = document.getElementById('password');
      const btn = document.getElementById('eyeBtn');
      if (p.type === 'password') { p.type = 'text'; btn.textContent = '🙈'; }
      else { p.type = 'password'; btn.textContent = '👁'; }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pwd = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');

      if (!email || !pwd) { showAlert('⚠ Please fill all fields.', 'warning'); return; }

      btn.disabled = true;
      btn.textContent = '⏳ Logging in...';

      try {
        let student = null;
        let fromCloud = false;
        
        try {
          const { isReady, getClient } = await import('../js/supabase-db.js');
          if (isReady()) {
            const supabase = getClient();
            console.log('[Login] Querying Supabase as source of truth for:', email);
            const { data, error } = await supabase.from('students').select('*').eq('email', email).single();
            
            if (data && !error) {
              student = {
                id: 'STU' + Date.now(),
                studentId: data.student_id,
                fullName: data.full_name,
                name: data.full_name,
                email: data.email,
                mobile: data.mobile,
                password: data.password_hash || data.mobile,
                status: data.status,
                hasAttempted: data.has_attempted,
                courseApplied: data.course_applied,
                applicationStatus: data.application_status,
                examStatus: data.exam_status,
                examDate: data.exam_date
              };
              // Clear old session
              localStorage.removeItem('studentData');
              DB.addStudent(student); // Updates local cache
              fromCloud = true;
              console.log('[Login] Loaded current profile from Supabase:', student.email);
            } else if (error && error.code !== 'PGRST116') {
              console.log('[Login] Supabase error:', error.message);
            }
          }
        } catch (supaErr) {
          console.warn('[Login] Supabase fetch failed, trying local storage:', supaErr);
        }

        // Fallback: If not found in Supabase (e.g. offline), try localStorage
        if (!student) {
          student = DB.getStudentByEmail(email);
          if (student) console.log('[Login] Fallback: Loaded from local storage cache.');
        }

        if (!student) {
          showAlert('❌ No account found with this email. Please apply first.', 'danger');
          btn.disabled = false; btn.textContent = 'Login to Portal'; return;
        }
        
        if (student.password !== pwd && student.mobile !== pwd) {
          showAlert('❌ Incorrect password. Use your registered mobile number.', 'danger');
          btn.disabled = false; btn.textContent = 'Login to Portal'; return;
        }

        DB.setCurrentStudent(student);
        localStorage.setItem("studentData", JSON.stringify(student));
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Login error:', error);
        showAlert('❌ ' + (error.message || 'An error occurred during login.'), 'danger');
        btn.disabled = false; 
        btn.textContent = 'Login to Portal';
      }
    });
  </script>
</body>
</html>
