<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | CET Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  
  <!-- Animated Background -->
  <div class="absolute inset-0 z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-500/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/10 rounded-full blur-[120px]"></div>
  </div>

  <div class="max-w-md w-full z-10">
    
    <!-- Branding -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl mx-auto shadow-xl shadow-indigo-500/20 mb-4">🔐</div>
      <h1 class="text-3xl font-black text-white tracking-tight">Recover Access</h1>
      <p class="text-slate-400 mt-2 font-medium">Lost your password? We'll help you reset it.</p>
    </div>

    <!-- Step 1: Enter Email -->
    <div id="step-email" class="glass rounded-[2rem] p-8 shadow-2xl">
      <form onsubmit="handleRequestOTP(event)">
        <div class="mb-6">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Registered Email Address</label>
          <input 
            type="email" 
            id="forgot-email" 
            required
            placeholder="john@example.com"
            class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl px-5 py-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-600"
          >
        </div>
        <button type="submit" id="btn-request" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
          Request Reset OTP
        </button>
      </form>
      <div class="mt-8 text-center">
        <a href="login.html" class="text-sm font-bold text-slate-500 hover:text-indigo-400 transition-colors">&larr; Back to Login</a>
      </div>
    </div>

    <!-- Step 2: Enter OTP -->
    <div id="step-otp" class="hidden glass rounded-[2rem] p-8 shadow-2xl">
      <div class="text-center mb-8">
        <h2 class="text-xl font-bold text-white">Check your Inbox</h2>
        <p class="text-slate-400 text-sm mt-1">We've sent a 6-digit code to your email.</p>
      </div>
      <form onsubmit="handleVerifyOTP(event)">
        <div class="mb-6 grid grid-cols-6 gap-2" id="otp-inputs">
           <!-- Dynamic inputs would go here, simplified for now -->
          <input type="text" maxlength="6" id="otp-code" class="col-span-6 w-full bg-slate-900/50 border border-slate-700 text-center text-3xl font-black tracking-[1rem] text-white rounded-xl py-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all">
          Verify & Proceed
        </button>
      </form>
    </div>

    <!-- Step 3: New Password -->
    <div id="step-new-password" class="hidden glass rounded-[2rem] p-8 shadow-2xl">
      <h2 class="text-xl font-bold text-white mb-6 text-center">Set New Password</h2>
      <form onsubmit="handleResetPassword(event)">
        <div class="mb-5">
           <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">New Password (Min 6 Chars)</label>
           <input type="password" id="new-pw" required minlength="6" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl px-5 py-4 outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-8">
           <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Confirm New Password</label>
           <input type="password" id="confirm-pw" required minlength="6" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl px-5 py-4 outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition-all">
          Update Password
        </button>
      </form>
    </div>

  </div>

  <script src="../js/db.js" type="module"></script>
  <script type="module">
    import DB from '../js/db.js';

    let targetEmail = "";
    let generatedOTP = "";
    let otpExpiry = 0;

    window.handleRequestOTP = (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value;
      const students = DB.getStudents();
      const student = students.find(s => s.email === email);

      if (!student) {
        alert("The provided email is not registered in our system.");
        return;
      }

      targetEmail = email;
      // 1. Generate 6-digit OTP
      generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
      // 2. Set Expiry (10 minutes)
      otpExpiry = Date.now() + (10 * 60 * 1000);

      console.log(`[MOCK MAIL SERVICE] To: ${targetEmail} | Subject: Password Reset OTP | Content: Your code is ${generatedOTP}. Expiring in 10 mins.`);
      
      alert(`✅ A 6-digit OTP has been sent to ${email} (Check Console for Mock Email).`);
      
      document.getElementById('step-email').classList.add('hidden');
      document.getElementById('step-otp').classList.remove('hidden');
    };

    window.handleVerifyOTP = (e) => {
      e.preventDefault();
      const entered = document.getElementById('otp-code').value;

      if (Date.now() > otpExpiry) {
        alert("❌ OTP has expired. Please request a new one.");
        location.reload();
        return;
      }

      if (entered === generatedOTP) {
        document.getElementById('step-otp').classList.add('hidden');
        document.getElementById('step-new-password').classList.remove('hidden');
      } else {
        alert("❌ Invalid OTP code. Please check your email.");
      }
    };

    window.handleResetPassword = (e) => {
      e.preventDefault();
      const np = document.getElementById('new-pw').value;
      const cp = document.getElementById('confirm-pw').value;

      if (np !== cp) {
         alert("Passwords do not match!");
         return;
      }

      const students = DB.getStudents();
      const idx = students.findIndex(s => s.email === targetEmail);
      
      if (idx !== -1) {
        students[idx].password = np;
        DB.saveStudents(students);
        alert("✅ Password updated successfully! Redirecting to login...");
        window.location.href = 'login.html';
      }
    };
  </script>
</body>
</html>
